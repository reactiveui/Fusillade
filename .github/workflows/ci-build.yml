name: Build

on:
  push:
    branches:
      - main          # ✅ run on main
  pull_request:        # (optional) run on PRs targeting any branch
  
# Needed so the reusable workflow can optionally delete the temp per-OS artifacts it creates.
permissions:
  contents: read
  actions: write

jobs:
  build:
    uses: reactiveui/actions-common/.github/workflows/workflow-common-setup-and-build.yml@eda189f763e0e2758ca6d5dc560dc98754031f18 # main
    with:
      configuration: Release
      productNamespacePrefix: "Fusilade"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
